<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <!--
      Three-level grid to simulate architectural blueprint paper.
        minor  — 10 px divisions, barely visible hairlines
        medium — 50 px divisions, slightly more prominent
        major  — 100 px divisions, the most readable large grid
    -->

    <!-- 10 px minor grid -->
    <pattern id="minor" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none"
            stroke="rgba(140,200,255,0.07)" stroke-width="0.4"/>
    </pattern>

    <!-- 50 px medium grid (contains 5 × 5 minor cells) -->
    <pattern id="medium" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#minor)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none"
            stroke="rgba(140,200,255,0.16)" stroke-width="0.6"/>
    </pattern>

    <!-- 100 px major grid (contains 2 × 2 medium cells) -->
    <pattern id="major" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#medium)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none"
            stroke="rgba(140,200,255,0.30)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="100" height="100" fill="url(#major)"/>
</svg>
